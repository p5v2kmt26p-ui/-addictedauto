<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addicted Auto Care — Premium Car Care, Abu Dhabi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--brand:#FF3D00;--brand-light:#FF5E33;--brand-dim:rgba(255,61,0,.15);--black:#0A0A0A;--dark:#111111;--dark2:#161616;--dark3:#1E1E1E;--dark4:#252525;--gray:#888;--gray-light:#AAA;--white:#FFF;--white90:rgba(255,255,255,.9);--white60:rgba(255,255,255,.6);--white20:rgba(255,255,255,.08);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;line-height:1.6;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--dark);}::-webkit-scrollbar-thumb{background:var(--brand);border-radius:3px;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 5%;display:flex;align-items:center;justify-content:space-between;transition:all .35s ease;}nav.scrolled{background:rgba(10,10,10,.92);backdrop-filter:blur(20px);padding:14px 5%;box-shadow:0 2px 40px rgba(0,0,0,.5);}
.nav-logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.2rem;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:10px;}.nav-logo span{color:var(--brand);}
.logo-icon{width:38px;height:38px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.nav-links{display:flex;gap:32px;list-style:none;}.nav-links a{color:var(--white60);text-decoration:none;font-size:.9rem;font-weight:500;transition:color .3s;}.nav-links a:hover{color:var(--white);}
.nav-cta{background:var(--brand);color:var(--white);padding:10px 22px;border-radius:8px;text-decoration:none;font-weight:700;font-size:.9rem;transition:all .3s;}.nav-cta:hover{background:var(--brand-light);transform:translateY(-2px);}
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#0A0A0A 0%,#330000 50%,#0A0A0A 100%);}.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(255,61,0,.12) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(255,61,0,.06) 0%,transparent 50%);}.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,61,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,61,0,.03) 1px,transparent 1px);background-size:60px 60px;}
.hero-content{position:relative;z-index:2;padding:120px 5% 80px;max-width:700px;}.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--brand-dim);border:1px solid rgba(255,61,0,.3);padding:8px 16px;border-radius:100px;font-size:.8rem;font-weight:600;color:var(--brand);margin-bottom:24px;letter-spacing:.05em;}
.hero h1{font-family:'Montserrat',sans-serif;font-size:clamp(2.4rem,6vw,4.2rem);font-weight:900;line-height:1.05;margin-bottom:20px;}.hero h1 span{color:var(--brand);}
.hero-sub{font-size:1.1rem;color:var(--white60);margin-bottom:36px;max-width:520px;line-height:1.7;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:40px;}
.btn-primary{background:var(--brand);color:var(--white);padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem;transition:all .3s;display:inline-flex;align-items:center;gap:8px;}.btn-primary:hover{background:var(--brand-light);transform:translateY(-3px);box-shadow:0 12px 40px rgba(255,61,0,.35);}
.btn-outline{border:1.5px solid rgba(255,61,0,.5);color:var(--brand);padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:600;font-size:.95rem;transition:all .3s;}.btn-outline:hover{background:var(--brand-dim);border-color:var(--brand);}
.hero-phone{display:flex;align-items:center;gap:10px;color:var(--white60);font-size:.9rem;}.hero-phone strong{color:var(--white);font-size:1rem;}
.rating-badge{position:absolute;bottom:60px;right:5%;background:var(--dark3);border:1px solid var(--white20);padding:20px 24px;border-radius:16px;text-align:center;backdrop-filter:blur(10px);}.rating-badge .stars{font-size:1.4rem;margin-bottom:4px;}.rating-badge .score{font-family:'Montserrat',sans-serif;font-size:2rem;font-weight:900;color:var(--brand);}.rating-badge .label{font-size:.75rem;color:var(--gray-light);}
.pills-section{background:var(--dark2);padding:20px 5%;overflow-x:auto;border-bottom:1px solid var(--white20);}.pills-track{display:flex;gap:12px;min-width:max-content;}
.pill{background:var(--dark3);border:1px solid var(--white20);padding:10px 20px;border-radius:100px;font-size:.85rem;font-weight:500;white-space:nowrap;cursor:default;transition:all .3s;}.pill:hover{background:var(--brand-dim);border-color:var(--brand);color:var(--brand);}
.about{padding:100px 5%;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}.about-img-block{background:linear-gradient(135deg,var(--dark3),var(--dark4));border-radius:20px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:5rem;border:1px solid var(--white20);position:relative;overflow:hidden;}.about-img-block::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(255,61,0,.1) 0%,transparent 70%);}.about-accent{position:absolute;bottom:-20px;right:-20px;width:120px;height:120px;background:var(--brand);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;box-shadow:0 8px 40px rgba(255,61,0,.4);}
.section-tag{color:var(--brand);font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;}.section-title{font-family:'Montserrat',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;line-height:1.2;margin-bottom:16px;}
.brand-line{width:50px;height:3px;background:var(--brand);border-radius:2px;margin-bottom:24px;}
.about-text{color:var(--white60);line-height:1.8;margin-bottom:28px;}
.checklist{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:32px;}.checklist li{display:flex;align-items:center;gap:12px;color:var(--white90);font-size:.95rem;}
.check-icon{width:22px;height:22px;background:var(--brand-dim);border:1px solid var(--brand);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--brand);font-size:.75rem;flex-shrink:0;}
.stats{background:linear-gradient(135deg,var(--dark2),var(--dark3));padding:70px 5%;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;}.stat-item{text-align:center;padding:30px 20px;position:relative;}.stat-item+.stat-item::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--white20);}
.stat-num{font-family:'Montserrat',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;color:var(--brand);line-height:1;}.stat-label{color:var(--gray-light);font-size:.85rem;margin-top:6px;}
.services{padding:100px 5%;}.section-header{text-align:center;margin-bottom:60px;}.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.service-card{background:var(--dark2);border:1px solid var(--white20);border-radius:16px;padding:32px;transition:all .35s;position:relative;overflow:hidden;cursor:default;}.service-card::before{content:'';position:absolute;inset:0;background:var(--brand-dim);opacity:0;transition:opacity .35s;}.service-card:hover{border-color:var(--brand);transform:translateY(-6px);box-shadow:0 20px 60px rgba(255,61,0,.15);}.service-card:hover::before{opacity:1;}
.service-icon{font-size:2.2rem;margin-bottom:16px;display:block;}.service-name{font-family:'Montserrat',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:10px;position:relative;}.service-desc{color:var(--gray-light);font-size:.88rem;line-height:1.7;position:relative;}
.service-arrow{position:absolute;top:20px;right:20px;width:32px;height:32px;background:var(--brand-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--brand);font-size:.9rem;opacity:0;transition:opacity .3s;}.service-card:hover .service-arrow{opacity:1;}
.why{background:var(--dark2);padding:100px 5%;}.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:60px;}
.why-card{background:var(--dark3);border:1px solid var(--white20);border-radius:16px;padding:36px;transition:all .35s;}.why-card:hover{transform:translateY(-6px);border-color:var(--brand);box-shadow:0 16px 50px rgba(255,61,0,.12);}
